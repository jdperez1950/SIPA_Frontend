<aside 
  class="bg-white border-r border-gray-200 transition-all duration-300 ease-in-out flex flex-col h-full"
  [class.w-64]="layoutService.isSidebarOpen()"
  [class.w-20]="!layoutService.isSidebarOpen()"
>
  <!-- Logo Header -->
  <div class="h-16 flex items-center justify-center border-b border-gray-200">
    <span class="material-symbols-rounded text-blue-700 text-3xl">admin_panel_settings</span>
    @if (layoutService.isSidebarOpen()) {
      <span class="ml-2 font-bold text-xl text-gray-800">SIPA v2</span>
    }
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto py-4">
    <ul class="space-y-1 px-3">
      @for (item of menuItems; track item.label) {
        <li>
          <a 
            [routerLink]="item.route" 
            routerLinkActive="bg-blue-50 text-blue-700"
            class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors group"
          >
            <span class="material-symbols-rounded text-2xl group-hover:text-blue-600">{{ item.icon }}</span>
            @if (layoutService.isSidebarOpen()) {
              <span class="ml-3 font-medium">{{ item.label }}</span>
            }
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer Info -->
  @if (layoutService.isSidebarOpen()) {
    <div class="p-4 border-t border-gray-200">
      <div class="text-xs text-gray-400 text-center">
        &copy; 2026 SIPA v2 Admin
      </div>
    </div>
  }
</aside>
