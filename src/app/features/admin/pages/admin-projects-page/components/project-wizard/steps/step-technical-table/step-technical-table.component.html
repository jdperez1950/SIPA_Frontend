<div class="animate-fade-in space-y-4">
  <h3 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
    <span class="material-symbols-rounded text-blue-600">engineering</span>
    Designación de Mesa Técnica
  </h3>

  @if (loading()) {
    <div class="p-6 text-sm text-gray-500 border border-gray-200 rounded-xl bg-gray-50">
      Cargando asesores...
    </div>
  } @else if (!advisors().length) {
    <div class="p-6 text-sm text-amber-700 border border-amber-200 rounded-xl bg-amber-50">
      No hay asesores activos disponibles.
    </div>
  } @else {
    <div class="space-y-3">
      @for (axis of displayedAxes(); track axis.id) {
        <div class="border border-gray-200 rounded-xl p-4 bg-white">
          <div class="flex items-center justify-between mb-3">
            <p class="font-medium text-gray-900">{{ axis.name }}</p>
          </div>

          <app-custom-dropdown
            [items]="getAdvisorOptions(axis.id)"
            [selectedValue]="getAssignment(axis.id)"
            [placeholder]="'Seleccione asesor'"
            [enableSearch]="true"
            (valueChange)="onSelectAdvisor(axis.id, $event)"
          ></app-custom-dropdown>
        </div>
      }
    </div>
  }
</div>
