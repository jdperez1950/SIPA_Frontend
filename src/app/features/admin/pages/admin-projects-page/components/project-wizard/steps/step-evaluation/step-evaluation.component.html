<div class="animate-fade-in">
  <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
    <span class="material-symbols-rounded text-blue-600">quiz</span>
    Parametrización de Evaluación
  </h3>
  <p class="text-gray-500 mb-6">Selecciona los ejes temáticos que aplicarán a este proyecto.</p>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    @for (axis of axes; track axis.id) {
      <div 
        (click)="toggleAxis.emit(axis.id)"
        class="cursor-pointer border-2 rounded-xl p-6 transition-all duration-200 flex items-start gap-4 group hover:shadow-md border-gray-200 bg-white hover:border-blue-300"
      >
        <!-- Checkbox / Status -->
        <div 
          class="w-6 h-6 rounded border-2 flex items-center justify-center transition-colors mt-1 border-gray-300 bg-white"
        >
        </div>

        <!-- Info -->
        <div class="flex-1">
          <h4 class="font-bold text-gray-900 mb-1">{{ axis.name }}</h4>
          <p class="text-sm text-gray-500 mb-2">
            Click para activar
          </p>
          @if (axis.code) {
            <div class="flex items-center gap-1 text-xs font-medium text-gray-400 bg-gray-100 px-2 py-1 rounded w-fit">
              <span class="material-symbols-rounded text-sm">code</span>
              Código: {{ axis.code }}
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
