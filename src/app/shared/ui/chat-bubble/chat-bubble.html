<div class="flex flex-col gap-1 max-w-[80%]" [class.self-end]="isSelf()" [class.items-end]="isSelf()" [class.self-start]="!isSelf()" [class.items-start]="!isSelf()">
  <div class="flex items-baseline gap-2 text-xs text-gray-500">
    <span class="font-semibold">{{ author() }}</span>
    <span>{{ date() | date:'short' }}</span>
  </div>
  <div class="p-3 rounded-lg text-sm" 
       [class.bg-blue-100]="isSelf()" 
       [class.text-blue-900]="isSelf()"
       [class.rounded-tr-none]="isSelf()"
       [class.bg-gray-100]="!isSelf()" 
       [class.text-gray-900]="!isSelf()"
       [class.rounded-tl-none]="!isSelf()">
    {{ message() }}
  </div>
</div>
